<!doctype html>
<html>
  <head>
    <title>Scientific Calculator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <h1 class="text-center mt-3">Scientific Calculator</h1>

      <div class="row">
        <div class="col-12 offset-md-3 col-md-6">
          <div class="card shadow">
            <div class="card-body">
              <input
                id="calc-display"
                readonly
                class="form-control form-control-lg text-end mb-2"
                type="text"
              />

              <div class="row gx-1">
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">(</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">)</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">%</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-danger w-100 mt-2 border">AC</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">7</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">8</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">9</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">÷</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">4</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">5</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">6</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">×</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">1</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">2</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">3</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">-</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">0</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">.</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-primary w-100 mt-2 border">=</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">+</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">sin</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">cos</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">tan</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">√</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">log</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">ln</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">π</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">e</button>
                </div>

                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">x²</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-light w-100 mt-2 border">^</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-secondary w-100 mt-2 border">⌫</button>
                </div>
                <div class="col-3">
                  <button class="btn btn-secondary w-100 mt-2 border">C</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
